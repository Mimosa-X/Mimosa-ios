name: CI

on:
  push:
    branches: [ master ]

  pull_request:
    branches: [ master ]

  workflow_dispatch:

jobs:
  build:
    runs-on: macos-26
    timeout-minutes: 360

    permissions:
      contents: write   # нужно для создания GitHub Release с .ipa

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Set active Xcode path
        run: |
          XCODE_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["xcode"]);')
          sudo xcode-select -s /Applications/Xcode_$XCODE_VERSION.app/Contents/Developer
          xcodebuild -version

      # Кэширую bazel root + локальный disk_cache между прогонами:
      # iOS-сборка телеги ~20 минут вхолостую, с кешем держится ~6 минут.
      # Ключ привязан к pinу bazel + sha submodule'ов чтобы не подтягивать
      # битый кеш после обновления tgcalls/webrtc/td.
      - name: Cache bazel
        uses: actions/cache@v4
        with:
          path: |
            /private/var/tmp/_bazel_containerhost
            ~/.cache/bazel-disk-cache
          key: bazel-${{ runner.os }}-${{ hashFiles('versions.json', '.gitmodules', '**/BUILD', '**/*.bzl') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Create canonical source directory
        run: |
          set -x
          # Путь к исходникам захардкожен в Bazel-кешах через `--source_dir`-подобные
          # параметры — пересборка из другого пути получит cache miss.
          sudo mkdir -p /Users/Shared
          cp -R "$GITHUB_WORKSPACE" /Users/Shared/
          mv "/Users/Shared/$(basename "$GITHUB_WORKSPACE")" /Users/Shared/telegram-ios

      - name: Generate self-signed signing cert (overwrite SelfSigned.p12)
        run: |
          set -x
          cd /Users/Shared/telegram-ios/build-system/fake-codesigning/certs
          # SelfSigned.p12 в репе — на самом деле публичная часть реального
          # AppStore cert'а от Telegram FZ-LLC (CN = "Apple Distribution:
          # Telegram FZ-LLC (C67CF9S4VU)"), без работающего private key.
          # GenerateProfiles вшивает его DER в DeveloperCertificates, потом
          # codesign на хосте ищет identity с этим cert + matching private
          # key и не находит. Поэтому генерю свежую self-signed пару прямо
          # в CI — эфемерно, в репу не комитим.
          #
          # Использую /usr/bin/openssl (системный LibreSSL), а не openssl
          # из homebrew (3.x). Apple Security падает на 'MAC verification
          # failed' если p12 написан OpenSSL 3 — он использует PBMAC1+
          # PBKDF2 для MAC-KDF, а Security ждёт классический PKCS#12 KDF
          # из PKCS#5 v1. -legacy + -macalg sha1 не помогли (MAC всё равно
          # пишется через PBMAC1). LibreSSL пишет PKCS#12 в старом
          # формате, который Security разбирает без вопросов.
          #
          # extendedKeyUsage=codeSigning обязателен: security find-identity
          # -p codesigning отбирает identity именно по этому EKU.
          OSSL=/usr/bin/openssl
          $OSSL req -x509 -newkey rsa:2048 -days 3650 -nodes \
            -keyout self.key -out self.cer \
            -subj "/CN=Opengram Fake Signing/O=Opengram/C=RU" \
            -addext "extendedKeyUsage=codeSigning"
          $OSSL pkcs12 -export -out SelfSigned.p12 \
            -inkey self.key -in self.cer \
            -passout pass:
          cp self.cer Public.cer
          rm self.key self.cer
          $OSSL pkcs12 -in SelfSigned.p12 -passin pass: -nokeys | \
            $OSSL x509 -noout -subject

      - name: Regenerate fake provisioning profiles
        run: |
          set -x
          cd /Users/Shared/telegram-ios
          # Беру свежесгенерированный SelfSigned.p12, выдираю его cert в DER,
          # подменяю DeveloperCertificates[0] во всех .mobileprovision файлах
          # и заново подписываю plist через cms -S тем же cert+key. После
          # этого bazel/codesign в sandbox по hash из профайла найдёт нашу
          # identity в keychain и сможет подписать .ipa.
          # Логика — в build-system/Make/GenerateProfiles.py, готовая.
          REGEN_DIR="$PWD/build-input/regen-profiles"
          rm -rf "$REGEN_DIR"
          mkdir -p "$REGEN_DIR"
          python3 - <<'EOF'
          import sys
          sys.path.insert(0, 'build-system/Make')
          import GenerateProfiles
          GenerateProfiles.generate_provisioning_profiles(
              source_path='build-system/fake-codesigning/profiles',
              destination_path='build-input/regen-profiles',
              certs_path='build-system/fake-codesigning/certs',
          )
          EOF
          cp -f "$REGEN_DIR"/*.mobileprovision build-system/fake-codesigning/profiles/

      - name: Build the App
        run: |
          set -x

          SOURCE_DIR=/Users/Shared/telegram-ios
          BAZEL_USER_ROOT="/private/var/tmp/_bazel_containerhost"

          cd "$SOURCE_DIR"

          BUILD_NUMBER_OFFSET="$(cat build_number_offset)"

          export APP_VERSION=$(cat versions.json | python3 -c 'import json,sys;obj=json.load(sys.stdin);print(obj["app"]);')
          export COMMIT_COUNT=$(git rev-list --count HEAD)
          export COMMIT_COUNT="$(($COMMIT_COUNT+$BUILD_NUMBER_OFFSET))"
          export BUILD_NUMBER="$COMMIT_COUNT"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $GITHUB_ENV
          echo "APP_VERSION=$APP_VERSION" >> $GITHUB_ENV

          # Импорт SelfSigned.p12 в login.keychain. Профайлы шагом выше
          # уже переподписаны нашим cert, так что bazel matching отработает.
          python3 build-system/Make/ImportCertificates.py --path build-system/fake-codesigning/certs
          # release_arm64 — реальная device-сборка, на выходе .ipa который
          # ставится через Sideloadly / TrollStore / AltStore. --disableExtensions
          # оставляю: extensions (Widget/Share/Watch/Intents) тащат за собой
          # entitlements, которые apple-issued profile подтверждает на App Store
          # серверах — даже с переподписью fake-cert эти entitlements в runtime
          # отвалятся. Для sideload main-app достаточно.
          python3 -u build-system/Make/Make.py \
            --bazelUserRoot="$BAZEL_USER_ROOT" \
            build \
            --configurationPath="build-system/appstore-configuration.json" \
            --codesigningInformationPath=build-system/fake-codesigning \
            --configuration=release_arm64 \
            --buildNumber="$BUILD_NUMBER" \
            --disableExtensions

          # Сборка артефактов: .ipa + .dSYM
          OUTPUT_PATH="build/artifacts"
          rm -rf "$OUTPUT_PATH"
          mkdir -p "$OUTPUT_PATH"
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/Telegram.ipa; do
            cp "$f" "$OUTPUT_PATH/"
          done

          mkdir -p build/DSYMs
          for f in bazel-out/applebin_ios-ios_arm*-opt-ST-*/bin/Telegram/*.dSYM; do
            cp -R "$f" build/DSYMs/
          done
          (cd build && zip -r "../$OUTPUT_PATH/Telegram.DSYMs.zip" DSYMs >/dev/null)

      # Артефакты прикладываю к workflow run всегда (и для PR, и для master)
      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-${{ env.BUILD_NUMBER }}-ipa
          path: /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
          retention-days: 30
          if-no-files-found: error

      - name: Upload DSYMs artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Telegram-${{ env.BUILD_NUMBER }}-dsyms
          path: /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip
          retention-days: 30
          if-no-files-found: error

      # GitHub Release создаю только из master, не из PR
      - name: Create Release with assets
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ env.BUILD_NUMBER }}
          name: Opengram ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }})
          body: |
            Unsigned iOS build of Opengram (форк telegram-ios) ${{ env.APP_VERSION }} (${{ env.BUILD_NUMBER }}).
            Установка через Sideloadly / TrollStore / AltStore.
          draft: false
          prerelease: false
          files: |
            /Users/Shared/telegram-ios/build/artifacts/Telegram.ipa
            /Users/Shared/telegram-ios/build/artifacts/Telegram.DSYMs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
